name: Docs

on:
  push:
    branches:
    - main
    - v[0-9]+
  pull_request:
    branches:
    - main
    - v[0-9]+

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31
    - run: nix-env -f docs/default.nix -iA build
    - run: postgrest-docs-build

  spellcheck:
    name: Run spellcheck
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31
    - run: nix-env -f docs/default.nix -iA spellcheck
    - run: postgrest-docs-spellcheck

  dictcheck:
    name: Run dictcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31
      - run: nix-env -f docs/default.nix -iA dictcheck
      - run: postgrest-docs-dictcheck

  linkcheck:
    name: Run linkcheck
    if: github.base_ref == 'main'
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31
    - run: nix-env -f docs/default.nix -iA linkcheck
    - run: postgrest-docs-linkcheck
    
